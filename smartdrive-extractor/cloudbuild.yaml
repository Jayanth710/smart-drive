# options:
#   logging: CLOUD_LOGGING_ONLY

steps:
  # Step 1: Build the Docker image from the monorepo root
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/smartdrive-461502/smartdrive-repo/smartdrive-extractor:$SHORT_SHA'
      - '-f'
      - 'smartdrive-extractor/Dockerfile'
      - '.' # The root context

  # Step 2: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'smartdrive-extractor'
      - '--image=us-central1-docker.pkg.dev/smartdrive-461502/smartdrive-repo/smartdrive-extractor:$SHORT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--memory=4Gi'
      - '--cpu=2'
      - '--timeout=3600'
      - '--set-secrets=GOOGLE_API_KEY=GOOGLE_API_KEY:latest,WEAVIATE_API_KEY=WEAVIATE_API_KEY:latest,WEAVIATE_URL=WEAVIATE_URL:latest,GCP_PROJECT_ID=GCP_PROJECT_ID:latest,PUBSUB_DATA_SUBSCRIPTION_ID=PUBSUB_DATA_SUBSCRIPTION_ID:latest,HF_TOKEN=HF_TOKEN:latest,LLM_MODEL=LLM_MODEL:latest'

# This block automatically handles the push to Artifact Registry
images:
  - 'us-central1-docker.pkg.dev/smartdrive-461502/smartdrive-repo/smartdrive-extractor:$SHORT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY